post_hook = "sh -lc 'src=\"$HOME/.cache/noctalia/antigravity/NoctaliaTheme-color-theme.json\"; for dst in \"$HOME\"/.antigravity/extensions/noctalia.noctaliatheme-*/themes/NoctaliaTheme-color-theme.json; do [ -e \"$dst\" ] || continue; cp \"$src\" \"$dst\"; done'"
